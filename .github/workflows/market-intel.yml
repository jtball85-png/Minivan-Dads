# Market Intel agent — the company's first live department (Phase 2).
#
# Runs Thursday night US Central (02:00 UTC Friday = 9pm CDT / 8pm CST
# Thursday) so the report is on file for the CEO's Friday-morning
# `brain ingest`. Also runnable on demand from the Actions tab.
#
# One-time setup (CEO): repo Settings -> Secrets and variables -> Actions ->
# New repository secret: ANTHROPIC_API_KEY.

name: market-intel-agent

on:
  schedule:
    - cron: "0 2 * * 5"   # Friday 02:00 UTC = Thursday night US Central
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  run-agent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e .

      - name: Run the agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python -m brain agent market_intel

      - name: Commit the report
        id: commit
        run: |
          git config user.name "market-intel-agent"
          git config user.email "agent@minivan-dads.invalid"
          git add hq/reports/ hq/escalations/
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Market Intel weekly report ($(date -u +%Y-%m-%d))"
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # GitHub emails you when an issue opens in your repo (make sure you
      # "Watch: All activity" on the repo). Zero extra credentials needed.
      - name: Notify the CEO (GitHub issue -> email)
        if: steps.commit.outputs.committed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue create \
            --title "Market Intel filed its report ($(date -u +%Y-%m-%d))" \
            --body "The scheduled research run finished and committed its report to HQ.

          Next step: open your console (Minivan Dads HQ.bat) — the sync banner will offer one click to pull it in and build the agenda. Or run #ingest yourself.

          Report: https://github.com/${{ github.repository }}/tree/main/hq/reports/market_intel" \
            || echo "Issue creation failed (non-fatal)."
