model: claude-sonnet-5  # recommended for cost-appropriate structured synthesis; override freely

# NOTE: with adaptive thinking, thinking tokens count against these caps —
# a "big" cap can still produce an EMPTY text response if thinking eats it
# all (observed 2026-07-23: agent + ingest at 8192 with the 107-product
# catalog in context). llm.py now raises LLMTruncated instead of returning
# truncated text; these caps are sized with thinking headroom.
max_tokens:
  ask: 4096
  ingest: 24576
  meeting: 16384
  directive: 4096
  discussion: 1024
  # Boardroom caps include adaptive-thinking tokens — keep generous headroom
  # or replies get truncated mid-sentence (observed at 600).
  boardroom_position: 2500
  boardroom_moderator: 1500
  boardroom_floor: 3000
  boardroom_synthesis: 8192
  agent: 24576

# How many web searches a department agent may burn per scheduled run.
agent_max_searches: 8

effort:
  ask: medium
  ingest: high
  meeting: high
  directive: medium
  boardroom_synthesis: high

paths:
  hq_root: hq
  prompts_root: brain/prompts

stale_directive_days: 30
decision_log_recent_n: 20

departments:
  - name: market_intel
    tier: 0
    status: active   # activated 2026-07-16 (Phase 2 launch, CEO decision — see decision log)
    report_cadence: weekly
  - name: creative
    tier: 1
    status: active   # activated 2026-07-19 (Phase 3 opened, CEO decision — see decision log)
    report_cadence: weekly
  - name: content
    tier: 0
    status: dormant
    report_cadence: weekly
  - name: product
    tier: 0
    status: dormant
    report_cadence: weekly
  - name: storefront
    tier: 1
    status: active   # activated 2026-07-20 (Phase 4 product-management, CEO-approved plan — see decision log)
    report_cadence: weekly
  - name: customer
    tier: 0
    status: dormant
    report_cadence: weekly
  - name: paid_ads
    tier: 0
    status: dormant
    report_cadence: weekly
  - name: finance
    tier: 0
    status: dormant
    report_cadence: weekly
