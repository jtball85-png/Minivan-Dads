  - ".DS_Store"
  - pattern: "._*"
    note: macOS AppleDouble sidecar files
  - note: >-
      Posters_in and Mug_all_sizes White additionally have redundant nested
      duplicate folders and unopened raw-download zips beyond the simple
      junk patterns above — reconcile_assets.py's scan should flag these by
      size/name heuristics but a human still confirms before deletion.
