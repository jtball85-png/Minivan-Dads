# Hand-curated facts about the CEO's Printful/design asset drive, captured
# from the 2026-07-23 inventory session. This is judgment ("is this folder
# finished art or just a blank template?") that a filename heuristic can't
# reliably reproduce — reconcile_assets.py merges this with a read-only scan
# of the drive, hq/products/catalog.json, and shopify-live-note.md to
# produce the generated assets-manifest.{json,md}.
#
# drive_root is checked at scan time; if the drive isn't mounted, paths below
# are still reported (from this seed) but flagged unverified rather than
# failing.

drive_root: "D:\\Products\\Printful Products"

designs:
  bodysurf-fin:
    master: garage/design/designs/bodysurf-fin/bodysurf-fin-master.svg
    source_ai:
      - "D:\\Products\\Designs Digital Illustrations\\Bodysurf Fin Fill\\Bodysurf Fin Fill.ai"
      - "D:\\Products\\Designs Digital Illustrations\\Bodysurf Fin Fill\\Bodysurf Fin Fill BW ONLY.ai"
    colorways:
      - Black/White
      - Red/Yellow
      - Peach/Burnt Orange
      - Blue/Pink
      - Peach/Blue
      - Lime Green/Electric Blue
      - Lavender/Teal
    products:
      - key: mug-white-glossy
        drive_dir: "Mug_all_sizes White"
        printful_type: mug (11oz/15oz/20oz, white glossy)
        art_status: live
        note: confirmed live 2026-07-21 as "Bodysurf Fin White Glossy Mug" (joshballart.com/products/white-glossy-mug-1); drive folder also has redundant nested duplicate colorway folders + an "archive (3)" subfolder + 8 unopened zips — cleanup candidate
      - key: mug-black
        drive_dir: "Mug_all_sizes Black"
        printful_type: mug (black base)
        art_status: art-ready-not-live
        note: distinct art from the white-glossy mug's live listing; not confirmed live under this colorway — verify against shopify-live-note.md before assuming
      - key: enamel-mug
        drive_dir: "Enamel mug"
        printful_type: enamel camp mug, 12oz
        art_status: live
        note: confirmed live 2026-07-21 as "Bodysurf Fin Enamel Cup"
      - key: tumbler
        drive_dir: "Wine tumbler guidelines"
        printful_type: wine tumbler
        art_status: live
        note: confirmed live 2026-07-21 as "Bodysurf Fin Tumbler"
      - key: water-bottle
        drive_dir: water_bottle_template
        printful_type: water bottle
        art_status: art-ready-not-live
        note: single size; B&W Bodysurf Fin design present as .ai/.psd/.jpg/.png; smallest/simplest not-yet-live candidate — first pick for the generalized driver's dry-run rehearsal
      - key: poster
        drive_dir: Posters_in
        printful_type: poster (16 size variants, 5x7 up to 24x36)
        art_status: live
        note: >-
          ~489MB, 16 sizes x 11 colorways already composited as PSDs. Largest
          and messiest folder on the drive (triple-nested __MACOSX shadow
          tree, .DS_Store throughout, extra "Posters_inches 2" wrapper,
          top cleanup priority). Export-on-demand only when a specific
          size/colorway is needed for a push — never bulk-copy into the repo.
          Large-file hosting for a Printful push is an open question, see
          the plan's "flagged for later" section.
      - key: beanie
        drive_dir: Embroidered Beanie
        printful_type: embroidered beanie (cuffed)
        art_status: live
        note: API-confirmed live 2026-07-23 as "Shred in Style Black Fin Bodysurf Cuffed Beanie" (sync id 334471140, 6 variants); real embroidery guideline PDF + .ai templates already curated at garage/design/printful-templates/embroidered-beanie/
      - key: tank-top
        drive_dir: "Men’s Staple Tank Top  Bella + Canvas 3480"
        printful_type: tank top (Bella+Canvas 3480)
        art_status: template-only-no-art
        note: NO Bodysurf Fin (or any) design has been applied to this product. Do not invent art — needs a real garage-design pass with CEO approval if ever pursued.
      - key: can-cooler
        drive_dir: Can Cooler
        printful_type: can cooler (regular + skinny)
        art_status: art-ready-not-live
        note: >-
          CORRECTED 2026-07-23: finished fin art EXISTS — but in Printful's
          cloud, not on the drive (saved product templates 97474610 "Can
          cooler" + 97477081 "Can Cooler Skinny", catalog product 764,
          red/pink fin on yellow — mockups verified via API). The drive
          folder holds only the blank template, which is why the drive-only
          inventory misclassified this as no-art.

# T-shirt is already curated at garage/design/printful-templates/t-shirt-bella-canvas-3001/
# (Minivan Dads' quiet-game tee, a different design, parked) — not a Bodysurf Fin product.
